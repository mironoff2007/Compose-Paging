VERSION_NAME=3.3.2-aurora
GROUP=com.androidx.compose

POM_DESCRIPTION=Compose Paging library
POM_NAME=Compose Paging
POM_INCEPTION_YEAR=2026

# Maven Central credentials
SONATYPE_USERNAME=your_sonatype_username
SONATYPE_PASSWORD=your_sonatype_password

# Signing
ORG_GRADLE_PROJECT_signingInMemoryKey=your_in_memory_gpg_key
ORG_GRADLE_PROJECT_signingKey=your_gpg_key
ORG_GRADLE_PROJECT_signingPassword=your_gpg_key_password

# GitHub Packages
USERNAME=your_github_username
TOKEN=your_github_token

# Enable AndroidX support
android.useAndroidX=true

# Optional: Disables the legacy Jetifier (saves build time since KMP uses modern AndroidX)
android.enableJetifier=false

